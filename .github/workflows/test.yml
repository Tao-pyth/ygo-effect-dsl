name: Tests

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install build pytest

      - name: Verify installed package version
        run: >
          python -c "from importlib.metadata import version;
          import ygo_effect_dsl;
          assert version('ygo-effect-dsl') == ygo_effect_dsl.__version__"

      - name: Run pytest
        run: python -m pytest

      - name: Build and audit wheel and sdist
        run: |
          python -m build
          python -m ygo_effect_dsl.release_audit dist/*.whl dist/*.tar.gz > release-artifact-audit.json

      - name: Smoke test wheel in a clean virtual environment
        run: |
          python -m venv .release-venv
          .release-venv/bin/python -m pip install dist/*.whl
          .release-venv/bin/python -m ygo_effect_dsl --version
          .release-venv/bin/python -m ygo_effect_dsl experiment-search --help
          .release-venv/bin/python -m ygo_effect_dsl job-inspect --help
