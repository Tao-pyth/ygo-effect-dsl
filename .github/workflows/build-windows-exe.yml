name: Build Windows exe

on:
  pull_request:
  push:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install package and build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[analytics]"
          python -m pip install pytest pyinstaller

      - name: Run pytest
        run: python -m pytest

      - name: Verify installed package version
        run: >
          python -c "from importlib.metadata import version;
          import ygo_effect_dsl;
          assert version('ygo-effect-dsl') == ygo_effect_dsl.__version__"

      - name: Build executable
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          --onefile
          --name ygo-effect-dsl
          --add-data "resources;resources"
          --add-data "src/ygo_effect_dsl/resources;ygo_effect_dsl/resources"
          --hidden-import ygo_effect_dsl.resources
          src/ygo_effect_dsl/__main__.py

      - name: Verify executable exists
        run: |
          if (!(Test-Path "dist/ygo-effect-dsl.exe")) {
            throw "dist/ygo-effect-dsl.exe was not created"
          }

      - name: Smoke test packaged executable
        run: |
          .\dist\ygo-effect-dsl.exe --version
          .\dist\ygo-effect-dsl.exe ingest --dataset examples/sample_dataset
          .\dist\ygo-effect-dsl.exe validate-dict
          .\dist\ygo-effect-dsl.exe transform --dataset examples/sample_dataset --out data/exe_smoke
          .\dist\ygo-effect-dsl.exe validate data/exe_smoke/yaml
          .\dist\ygo-effect-dsl.exe validate-route examples/route_dsl/minimal_route.yaml
          .\dist\ygo-effect-dsl.exe experiment-search --help
          .\dist\ygo-effect-dsl.exe job-inspect --help

      - name: Upload executable artifact
        uses: actions/upload-artifact@v7
        with:
          name: ygo-effect-dsl-win64
          path: dist/ygo-effect-dsl.exe
          if-no-files-found: error
