name: Build Windows exe

on:
  pull_request:
  push:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package and build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pyinstaller

      - name: Run pytest
        run: python -m pytest

      - name: Build executable
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          --onefile
          --name ygo-effect-dsl
          --add-data "resources;resources"
          src/ygo_effect_dsl/__main__.py

      - name: Verify executable exists
        run: |
          if (!(Test-Path "dist/ygo-effect-dsl.exe")) {
            throw "dist/ygo-effect-dsl.exe was not created"
          }

      - name: Smoke test packaged executable
        run: |
          .\dist\ygo-effect-dsl.exe ingest --dataset examples/sample_dataset
          .\dist\ygo-effect-dsl.exe validate-dict
          .\dist\ygo-effect-dsl.exe transform --dataset examples/sample_dataset --out data/exe_smoke
          .\dist\ygo-effect-dsl.exe validate data/exe_smoke/yaml

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ygo-effect-dsl-win64
          path: dist/ygo-effect-dsl.exe
          if-no-files-found: error
