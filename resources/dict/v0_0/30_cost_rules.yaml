# 30_cost_rules.yaml
# v0.0 cost rules (minimum starter set: 8 rules)
# Generated: 2026-03-01
# Spec: docs/spec/v0.0/18_dictionary_format.md
#
# Notes:
# - These patterns are designed for normalized English text (recommended: lowercased).
# - Cost patterns are expected to match the LEFT side of ';' in the pipeline.

- id: 'COST_SEND_N_DESC_TO_GY__YOU_CAN'
  version: '0.0'
  priority: 220
  language: 'en'
  applies_to: 'cost'
  pattern: '^you can send 【N】 (?P<desc>.+?) to the gy;$'
  capture:
    n: 'N[0]'
    desc: '$desc'
  emit:
    cost:
      type: 'send_to_gy'
      n: '$n'
      desc: '$desc'
      to:
        - 'GY'
  on_fail: 'ignore'
  note: 'starter cost rule'
  examples:
    - 'You can send 1 card from your hand or field to the GY;'

