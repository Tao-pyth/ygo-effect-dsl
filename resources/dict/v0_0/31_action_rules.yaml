- id: 'ACTION_ADD_FROM_DECK_TO_HAND__YOU_CAN'
  version: '0.0'
  priority: 220
  language: 'en'
  applies_to: 'action'
  pattern: '^you can add 【N】 (?P<desc>.+?) from your deck to your hand\.$'
  capture:
    n: 'N[0]'
    desc: '$desc'
  emit:
    action:
      type: 'add_to_hand'
      n: '$n'
      from:
        - 'deck'
      to:
        - 'hand'
      desc: '$desc'
  on_fail: 'ignore'
  note: 'min-set v0.0: starter action rule'
  examples:
    - 'You can add 1 "White Forest" Spell/Trap from your Deck to your hand.'

