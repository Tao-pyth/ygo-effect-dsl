# 32_trigger_rules.yaml
# v0.0 trigger rules (minimum starter set: 12 rules)
# Generated: 2026-03-03
#
# Focus:
# - High-frequency timing phrases seen in unmatched_top and common Yu-Gi-Oh! text.
#
# Notes:
# - Patterns assume normalized English fragments (lowercase, trimmed) and often end with ':'.
# - Emits patch into effect.trigger.* (engine should deep-merge).
# - Some gate phrases are temporarily treated as trigger-ish for v0.0 convenience.
#
- id: 'TRIG_ON_SUMMON_NORMAL_OR_SPECIAL'
  version: '0.0'
  priority: 300
  language: 'en'
  applies_to: 'trigger'
  pattern: '^if this card is normal or special summoned:$'
  emit:
    trigger:
      type: 'summon'
      modes:
        - 'normal'
        - 'special'
  on_fail: 'ignore'
  note: 'summon trigger (normal or special)'
  examples:
    - 'If this card is Normal or Special Summoned:'

