# 32_trigger_rules.yaml
# v0.0 trigger rules (minimum starter set: 8 rules)
# Generated: 2026-03-01
# Spec: docs/spec/v0.0/18_dictionary_format.md
#
# Notes:
# - These patterns are designed for normalized English text (recommended: lowercased).
# - These are intentionally shallow: they aim to capture "trigger shape" not full semantics.

- id: 'TRIGGER_IF_THIS_CARD_NORMAL_SUMMONED'
  version: '0.0'
  priority: 220
  language: 'en'
  applies_to: 'trigger'
  pattern: '^if this card is normal summoned:$'
  emit:
    trigger:
      type: 'summon'
      modes:
        - 'normal'
  on_fail: 'ignore'
  note: 'starter trigger rule'
  examples:
    - 'If this card is Normal Summoned:'

