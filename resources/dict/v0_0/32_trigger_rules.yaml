- id: 'TRIG_WHEN_YOU_ACTIVATE_CARD_OR_EFFECT'
  version: '0.0'
  priority: 250
  language: 'en'
  applies_to: 'trigger'
  pattern: '^when you activate a (?P<what>spell|trap|monster) card or effect:$'
  capture:
    what: '$what'
  emit:
    trigger:
      type: 'activate'
      what: '$what'
  on_fail: 'ignore'
  note: 'trigger when you activate a card/effect (simplified)'
  examples:
    - 'When you activate a Spell Card or effect:'

